<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Whales in Eastern Pacific</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            box-sizing: border-box;
        }
        .header {
            text-align: center; /* Center the title and description for better visibility */
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            max-width: 100%;
            gap: 20px;
        }
        .map-container {
            flex: 1;
            height: 600px; /* Adjust height as needed */
            background-color: #ddd; /* Placeholder for map */
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
        }
        .instructions {
            flex: 1;
            max-width: 400px; /* Limit width for readability */
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        ul {
            list-style-type: disc;
            padding-left: 20px;
            font-size: 16px;
        }
        li {
            margin-bottom: 10px;
        }
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .instructions {
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Blue Whales in Eastern Pacific</h1>
        <p>This map animates the migration of blue whales through the Eastern Pacific from 1993 to 2009.</p>
    </div>
    
    <div class="container">
        <div class="map-container">
           <iframe  src="https://clausa.app.carto.com/map/a6d34dc6-545d-4d92-be1f-864cf466adcc" allowfullscreen webkitallowfullscreen mozallowfullscreen oallowfullscreen msallowfullscreen></iframe>
        </div>

        </div>
    </div>
</body>
</html>
